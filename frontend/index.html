<!DOCTYPE html>
<html>
<head>
  <title>Demo Invest</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #0f172a;
      color: white;
    }
    h1 {
      margin-top: 50px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>🚀 Demo Invest</h1>
  <p>Click button to connect backend</p>

  <button onclick="getData()">Check Backend</button>

  <div id="result"></div>

  <script>
    async function getData() {
      let res = await fetch("https://demo-invest.onrender.com/");
      let data = await res.text();
      document.getElementById("result").innerText = data;
    }
  </script>

</body>
</html>
