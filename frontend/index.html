<!DOCTYPE html>
<html>
<head>
  <title>Earn App</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #00c853;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Balance: ₹0</h2>

<button onclick="checkBalance()">Check Balance</button>
<button onclick="dailyEarn()">Daily Earn</button>
<button onclick="withdraw()">Withdraw</button>

<br><br>

<button onclick="invest(1000)">Invest ₹1000</button>
<button onclick="invest(5000)">Invest ₹5000</button>

<script>
const user = "arpit";

// ✅ Check Balance
async function checkBalance() {
  const res = await fetch("https://demo-invest.onrender.com/balance?user=" + user);
  const data = await res.json();
  document.querySelector("h2").innerText = "Balance: ₹" + data.balance;
}

// ✅ Invest
async function invest(amount) {
  const res = await fetch("https://demo-invest.onrender.com/invest?user=" + user + "&amount=" + amount);
  const data = await res.json();

  alert(data.message || data.error);
  checkBalance();
}

// ✅ Daily Earn (🔥 FIXED)
async function dailyEarn() {
  const res = await fetch("https://demo-invest.onrender.com/earn?user=" + user);
  const data = await res.json();

  alert(data.message || data.error);
  checkBalance();
}

// ✅ Withdraw
async function withdraw() {
  const res = await fetch("https://demo-invest.onrender.com/withdraw?user=" + user);
  const data = await res.json();

  alert(data.message || data.error);
}

// ✅ Auto load
window.onload = function() {
  checkBalance();
}
</script>

</body>
</html>
